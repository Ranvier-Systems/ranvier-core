<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <linearGradient id="axonDown" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- THUNDERBOLT: zig-zag axon, 3 segments with node gaps at each bend -->
  <!-- Shape: top-center down-right, snap left, down-right to bottom -->

  <!-- Segment 1: top to first bend (down-right) -->
  <path d="M 220 65 L 320 175"
        stroke="url(#axonDown)" stroke-width="22" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Myelin sheath seg 1 -->
  <path d="M 220 65 L 320 175" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(8,0)"/>
  <path d="M 220 65 L 320 175" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(-8,0)"/>

  <!-- NODE 1 — at the first zig -->
  <circle cx="320" cy="175" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.14"
          filter="url(#pulseGlow)"/>
  <circle cx="320" cy="175" r="11" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="320" cy="175" r="5.5" fill="#ffffff"/>

  <!-- Segment 2: snap left (the zag) -->
  <path d="M 320 175 L 195 265"
        stroke="url(#axonDown)" stroke-width="22" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Myelin sheath seg 2 -->
  <path d="M 320 175 L 195 265" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(0,8)"/>
  <path d="M 320 175 L 195 265" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(0,-8)"/>

  <!-- NODE 2 — at the second bend (center of canvas) -->
  <circle cx="195" cy="265" r="36" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.16"
          filter="url(#pulseGlow)"/>
  <circle cx="195" cy="265" r="12" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="195" cy="265" r="6" fill="#ffffff"/>

  <!-- Segment 3: down-right to bottom (the final zig) -->
  <path d="M 195 265 L 310 395"
        stroke="url(#axonDown)" stroke-width="22" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Myelin sheath seg 3 -->
  <path d="M 195 265 L 310 395" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(8,0)"/>
  <path d="M 195 265 L 310 395" stroke="#67e8f9" stroke-width="0.8" fill="none" opacity="0.1"
        transform="translate(-8,0)"/>

  <!-- Tapered tip at bottom -->
  <path d="M 310 395 L 335 440"
        stroke="#0e7490" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.6"/>

  <!-- Tapered tip at top -->
  <path d="M 220 65 L 205 42"
        stroke="#06b6d4" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.6"/>

  <!-- Signal particles along the bolt -->
  <g opacity="0.4">
    <circle cx="240" cy="88" r="2" fill="#a5f3fc"/>
    <circle cx="270" cy="120" r="1.5" fill="#a5f3fc"/>
    <circle cx="298" cy="152" r="2" fill="#a5f3fc"/>
    <circle cx="275" cy="200" r="1.5" fill="#a5f3fc"/>
    <circle cx="238" cy="235" r="2" fill="#a5f3fc"/>
    <circle cx="215" cy="295" r="1.5" fill="#a5f3fc"/>
    <circle cx="240" cy="325" r="2" fill="#a5f3fc"/>
    <circle cx="268" cy="358" r="1.5" fill="#a5f3fc"/>
    <circle cx="295" cy="385" r="2" fill="#a5f3fc"/>
  </g>
</svg>
