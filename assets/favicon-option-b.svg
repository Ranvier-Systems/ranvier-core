<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#091a30"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="none" stroke="#164e63" stroke-width="6"/>

  <!-- Option B: 8 spokes (compass rose), tapered, with secondary nodes mid-spoke -->

  <!-- Major spokes (N/S/E/W) — thicker -->
  <g stroke="#0891b2" stroke-width="24" stroke-linecap="round" filter="url(#glow)">
    <line x1="256" y1="186" x2="256" y2="60"/>
    <line x1="256" y1="326" x2="256" y2="452"/>
    <line x1="326" y1="256" x2="452" y2="256"/>
    <line x1="186" y1="256" x2="60" y2="256"/>
  </g>

  <!-- Minor spokes (diagonals) — thinner, shorter -->
  <g stroke="#0e7490" stroke-width="14" stroke-linecap="round" filter="url(#glow)">
    <line x1="305" y1="207" x2="390" y2="122"/>
    <line x1="305" y1="305" x2="390" y2="390"/>
    <line x1="207" y1="305" x2="122" y2="390"/>
    <line x1="207" y1="207" x2="122" y2="122"/>
  </g>

  <!-- Major tip nodes -->
  <g>
    <circle cx="256" cy="52" r="12" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="256" cy="460" r="12" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="460" cy="256" r="12" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="52" cy="256" r="12" fill="#67e8f9" filter="url(#glow)"/>
  </g>

  <!-- Minor tip nodes -->
  <g>
    <circle cx="396" cy="116" r="8" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="396" cy="396" r="8" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="116" cy="396" r="8" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="116" cy="116" r="8" fill="#22d3ee" filter="url(#glow)"/>
  </g>

  <!-- Mid-spoke secondary nodes on major axes -->
  <g>
    <circle cx="256" cy="120" r="6" fill="#a5f3fc" opacity="0.6"/>
    <circle cx="256" cy="392" r="6" fill="#a5f3fc" opacity="0.6"/>
    <circle cx="392" cy="256" r="6" fill="#a5f3fc" opacity="0.6"/>
    <circle cx="120" cy="256" r="6" fill="#a5f3fc" opacity="0.6"/>
  </g>

  <!-- Center core -->
  <circle cx="256" cy="256" r="60" fill="#22d3ee" opacity="0.12" filter="url(#bigGlow)"/>
  <circle cx="256" cy="256" r="40" fill="#a5f3fc" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="22" fill="#ffffff"/>
</svg>
