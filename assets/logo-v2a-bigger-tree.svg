<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <linearGradient id="axon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- AXON — same diagonal but starts further in, ends earlier to leave room for tree -->

  <!-- Segment 1 -->
  <path d="M 100 410 Q 125 380 148 348"
        stroke="url(#axon)" stroke-width="18" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 1 -->
  <circle cx="158" cy="333" r="28" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="158" cy="333" r="8" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="158" cy="333" r="4" fill="#ffffff"/>

  <!-- Segment 2 -->
  <path d="M 172 316 Q 198 278 222 248"
        stroke="url(#axon)" stroke-width="17" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 2 -->
  <circle cx="232" cy="233" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.14"
          filter="url(#pulseGlow)"/>
  <circle cx="232" cy="233" r="10" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="232" cy="233" r="5" fill="#ffffff"/>

  <!-- Segment 3 (shorter — tree starts sooner) -->
  <path d="M 246 216 Q 262 195 278 178"
        stroke="url(#axon)" stroke-width="15" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 3 -->
  <circle cx="286" cy="168" r="26" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="286" cy="168" r="7" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="286" cy="168" r="3.5" fill="#ffffff"/>

  <!-- BRANCHING TREE — much larger, fills upper-right -->

  <!-- Trunk -->
  <path d="M 298 156 Q 320 135 340 118"
        stroke="#0891b2" stroke-width="13" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.85"/>

  <!-- Branch A: upper-right -->
  <path d="M 340 118 Q 368 92 395 72"
        stroke="#0ea5e9" stroke-width="9" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.8"/>
  <!-- A sub-branches -->
  <path d="M 395 72 Q 412 58 430 48"
        stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M 395 72 Q 418 72 440 78"
        stroke="#38bdf8" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <circle cx="430" cy="48" r="4.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.85"/>
  <circle cx="440" cy="78" r="4" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>

  <!-- Branch B: right -->
  <path d="M 340 118 Q 375 115 408 118"
        stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.78"/>
  <!-- B sub-branches -->
  <path d="M 408 118 Q 428 110 448 106"
        stroke="#38bdf8" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 408 118 Q 430 126 450 135"
        stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.65"/>
  <circle cx="448" cy="106" r="4" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>
  <circle cx="450" cy="135" r="3.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.75"/>

  <!-- Branch C: lower-right -->
  <path d="M 340 118 Q 365 142 388 165"
        stroke="#0ea5e9" stroke-width="7" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.72"/>
  <!-- C sub-branches -->
  <path d="M 388 165 Q 410 165 432 162"
        stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.65"/>
  <path d="M 388 165 Q 405 185 420 205"
        stroke="#2dd4bf" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <circle cx="432" cy="162" r="3.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.75"/>
  <circle cx="420" cy="205" r="3" fill="#5eead4" filter="url(#tipGlow)" opacity="0.7"/>

  <!-- Myelin sheath lines -->
  <g opacity="0.1" stroke="#67e8f9" stroke-width="1" fill="none">
    <path d="M 105 404 Q 128 376 150 346" transform="translate(6,-7)"/>
    <path d="M 105 404 Q 128 376 150 346" transform="translate(-6,7)"/>
    <path d="M 176 311 Q 200 275 224 246" transform="translate(5,-6)"/>
    <path d="M 176 311 Q 200 275 224 246" transform="translate(-5,6)"/>
    <path d="M 249 212 Q 264 193 278 177" transform="translate(5,-5)"/>
    <path d="M 249 212 Q 264 193 278 177" transform="translate(-5,5)"/>
  </g>

  <!-- Signal particles -->
  <g opacity="0.35">
    <circle cx="115" cy="395" r="2" fill="#a5f3fc"/>
    <circle cx="140" cy="362" r="1.5" fill="#a5f3fc"/>
    <circle cx="188" cy="298" r="2" fill="#a5f3fc"/>
    <circle cx="212" cy="260" r="1.5" fill="#a5f3fc"/>
    <circle cx="260" cy="200" r="2" fill="#a5f3fc"/>
    <circle cx="310" cy="148" r="1.5" fill="#a5f3fc"/>
  </g>
</svg>
