<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>

    <!-- Node gap glow -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient pulse around nodes -->
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!--
    LETTER R — axon construction with prominent nodes

    Nodes (all r=14 ring, ~22px gap from segment ends):
      N1  (155, 80)   — top: spine + bowl start
      N2  (355, 180)  — bowl apex
      N3  (155, 280)  — junction: spine + horizontal bar
      N3b (220, 280)  — kick point: horizontal bar + bowl return + leg
      N4  (155, 440)  — spine terminal
      N5  (360, 440)  — leg terminal
  -->

  <!-- ═══ SEGMENTS — rounded ends, stopping short of nodes ═══ -->

  <!-- Upper Spine: N1 → N3 -->
  <line x1="155" y1="104" x2="155" y2="256"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round"/>

  <!-- Lower Spine: N3 → N4 -->
  <line x1="155" y1="304" x2="155" y2="416"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round"/>

  <!-- Bowl Upper Half: N1 → N2 (quarter-ellipse) -->
  <path d="M 178 82 Q 355 78 355 156"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Bowl Lower Half: N2 → N3b (quarter-ellipse) -->
  <path d="M 355 204 Q 355 280 244 280"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Horizontal Bar: N3 → N3b -->
  <line x1="178" y1="280" x2="196" y2="280"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round"/>

  <!-- Leg: N3b → N5 -->
  <line x1="235" y1="297" x2="345" y2="423"
        stroke="#0891b2" stroke-width="16" stroke-linecap="round"/>

  <!-- ═══ Myelin Sheath — subtle parallel lines ═══ -->
  <g opacity="0.1" stroke="#67e8f9" stroke-width="1" fill="none">
    <!-- Spine upper -->
    <line x1="163" y1="108" x2="163" y2="252"/>
    <line x1="147" y1="108" x2="147" y2="252"/>
    <!-- Spine lower -->
    <line x1="163" y1="308" x2="163" y2="412"/>
    <line x1="147" y1="308" x2="147" y2="412"/>
    <!-- Bowl upper half -->
    <path d="M 178 82 Q 355 78 355 156" transform="translate(0,-6)"/>
    <path d="M 178 82 Q 355 78 355 156" transform="translate(0,6)"/>
    <!-- Bowl lower half -->
    <path d="M 355 204 Q 355 280 244 280" transform="translate(0,-6)"/>
    <path d="M 355 204 Q 355 280 244 280" transform="translate(0,6)"/>
    <!-- Leg -->
    <line x1="235" y1="297" x2="345" y2="423" transform="translate(-5,5)"/>
    <line x1="235" y1="297" x2="345" y2="423" transform="translate(5,-5)"/>
  </g>

  <!-- ═══ Signal Particles ═══ -->
  <g opacity="0.35">
    <!-- Spine upper -->
    <circle cx="155" cy="150" r="2" fill="#a5f3fc"/>
    <circle cx="155" cy="210" r="1.5" fill="#a5f3fc"/>
    <!-- Spine lower -->
    <circle cx="155" cy="345" r="2" fill="#a5f3fc"/>
    <circle cx="155" cy="390" r="1.5" fill="#a5f3fc"/>
    <!-- Bowl upper -->
    <circle cx="240" cy="78" r="1.5" fill="#a5f3fc"/>
    <circle cx="320" cy="88" r="2" fill="#a5f3fc"/>
    <circle cx="352" cy="125" r="1.5" fill="#a5f3fc"/>
    <!-- Bowl lower -->
    <circle cx="352" cy="235" r="1.5" fill="#a5f3fc"/>
    <circle cx="330" cy="265" r="2" fill="#a5f3fc"/>
    <circle cx="285" cy="278" r="1.5" fill="#a5f3fc"/>
    <!-- Leg -->
    <circle cx="275" cy="340" r="2" fill="#a5f3fc"/>
    <circle cx="315" cy="385" r="1.5" fill="#a5f3fc"/>
  </g>

  <!-- ═══ NODES — Nodes of Ranvier (prominent hollow rings) ═══ -->

  <!-- N1 — top: spine start + bowl departure -->
  <circle cx="155" cy="80" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="155" cy="80" r="14" fill="#0a1628" stroke="#cffafe" stroke-width="3.5"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="155" cy="80" r="3" fill="#ffffff"/>

  <!-- N2 — bowl apex -->
  <circle cx="355" cy="180" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="355" cy="180" r="14" fill="#0a1628" stroke="#cffafe" stroke-width="3.5"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="355" cy="180" r="3" fill="#ffffff"/>

  <!-- N3 — junction: spine + horizontal bar -->
  <circle cx="155" cy="280" r="36" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.14"
          filter="url(#pulseGlow)"/>
  <circle cx="155" cy="280" r="16" fill="#0a1628" stroke="#cffafe" stroke-width="4"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="155" cy="280" r="3.5" fill="#ffffff"/>

  <!-- N3b — kick point: horizontal bar + bowl return + leg -->
  <circle cx="220" cy="280" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="220" cy="280" r="14" fill="#0a1628" stroke="#cffafe" stroke-width="3.5"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="220" cy="280" r="3" fill="#ffffff"/>

  <!-- N4 — spine terminal -->
  <circle cx="155" cy="440" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="155" cy="440" r="14" fill="#0a1628" stroke="#cffafe" stroke-width="3.5"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="155" cy="440" r="3" fill="#ffffff"/>

  <!-- N5 — leg terminal -->
  <circle cx="360" cy="440" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="360" cy="440" r="14" fill="#0a1628" stroke="#cffafe" stroke-width="3.5"
          filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="360" cy="440" r="3" fill="#ffffff"/>
</svg>
