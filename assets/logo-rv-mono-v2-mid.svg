<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <!-- Axon segment gradient (diagonal) -->
    <linearGradient id="axon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Axon vertical gradient (for spine — userSpaceOnUse to avoid zero-width bbox) -->
    <linearGradient id="axonV" x1="113" y1="440" x2="113" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Node gap glow — tighter, brighter -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Axon body glow -->
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Large ambient pulse around nodes -->
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!--
    RV MONOGRAM — shifted left 42px to center
    Nodes (~18px gap from segment ends):
      N1  (113, 80)   — top: spine + bowl start
      N2  (313, 180)  — bowl apex
      N3  (113, 280)  — junction: spine + horizontal bar
      N3b (218, 280)  — kick point: horizontal bar + bowl return + leg
      N4  (113, 480)  — spine terminal
      N5  (318, 480)  — V bottom
      N6  (398, 180)  — V right top
  -->
  <!-- ═══ SEGMENTS ═══ -->
  <!-- Upper Spine: N1 → N3 -->
  <line x1="113" y1="102" x2="113" y2="258"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Lower Spine: N3 → N4 -->
  <line x1="113" y1="302" x2="113" y2="458"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Bowl Upper Half: N1 → N2 (quarter-ellipse) -->
  <path d="M 134 82 Q 273 78 308 158"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Bowl Lower Half: N2 → N3b (quarter-ellipse) -->
  <path d="M 308 202 Q 293 260 242 276"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Horizontal Bar: N3 → N3b -->
  <line x1="134" y1="280" x2="196" y2="280"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Leg / V-left: N3b → N5 -->
  <line x1="228" y1="300" x2="308" y2="462"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- V-right: N5 → N6 (up to y=180, same height as N2) -->
  <line x1="330" y1="462" x2="392" y2="198"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- ═══ Signal Particles ═══ -->
  <g opacity="0.35">
    <!-- Spine upper -->
    <circle cx="113" cy="148" r="2" fill="#a5f3fc"/>
    <circle cx="113" cy="210" r="1.5" fill="#a5f3fc"/>
    <!-- Spine lower -->
    <circle cx="113" cy="360" r="2" fill="#a5f3fc"/>
    <circle cx="113" cy="420" r="1.5" fill="#a5f3fc"/>
    <!-- Bowl upper -->
    <circle cx="198" cy="78" r="1.5" fill="#a5f3fc"/>
    <circle cx="278" cy="88" r="2" fill="#a5f3fc"/>
    <circle cx="310" cy="125" r="1.5" fill="#a5f3fc"/>
    <!-- Bowl lower -->
    <circle cx="310" cy="235" r="1.5" fill="#a5f3fc"/>
    <circle cx="288" cy="265" r="2" fill="#a5f3fc"/>
    <circle cx="243" cy="278" r="1.5" fill="#a5f3fc"/>
    <!-- Leg / V-left -->
    <circle cx="238" cy="355" r="2" fill="#a5f3fc"/>
    <circle cx="278" cy="415" r="1.5" fill="#a5f3fc"/>
    <!-- V-right -->
    <circle cx="368" cy="300" r="2" fill="#a5f3fc"/>
    <circle cx="353" cy="390" r="1.5" fill="#a5f3fc"/>
  </g>
  <!-- ═══ NODES — Nodes of Ranvier ═══ -->
  <!-- N1 — top: spine start + bowl departure -->
  <circle cx="113" cy="80" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="113" cy="80" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="113" cy="80" r="4.5" fill="#ffffff"/>
  <!-- N2 — bowl apex -->
  <circle cx="313" cy="180" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="313" cy="180" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="313" cy="180" r="4.5" fill="#ffffff"/>
  <!-- N3 — junction: spine + horizontal bar -->
  <circle cx="113" cy="280" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="113" cy="280" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="113" cy="280" r="4.5" fill="#ffffff"/>
  <!-- N3b — kick point: horizontal bar + bowl return + leg -->
  <circle cx="218" cy="280" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="218" cy="280" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="218" cy="280" r="4.5" fill="#ffffff"/>
  <!-- N4 — spine terminal -->
  <circle cx="113" cy="480" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="113" cy="480" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="113" cy="480" r="4.5" fill="#ffffff"/>
  <!-- N5 — V bottom -->
  <circle cx="318" cy="480" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="318" cy="480" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="318" cy="480" r="4.5" fill="#ffffff"/>
  <!-- N6 — V right top (y=180) -->
  <circle cx="398" cy="180" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="398" cy="180" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="398" cy="180" r="4.5" fill="#ffffff"/>
</svg>
