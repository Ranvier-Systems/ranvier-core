<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!--
    IDEA 3 — "Compact Monogram"
    R's leg diagonal IS V's left arm — shared stroke.
    Creates a tight interlocking RV with fewer total strokes.
    The V's right arm branches off the shared bottom node.

    Nodes (7):
      N1  (120, 72)   — R top
      N2  (280, 148)  — R bowl apex
      N3  (120, 252)  — R junction
      N3b (215, 252)  — R kick / shared diagonal start
      N4  (120, 448)  — R spine terminal
      N5  (325, 448)  — shared bottom (R leg = V bottom)
      N6  (420, 115)  — V right arm top
  -->

  <!-- ═══ SEGMENTS ═══ -->
  <!-- Upper Spine: N1 → N3 -->
  <line x1="120" y1="94" x2="120" y2="230"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Lower Spine: N3 → N4 -->
  <line x1="120" y1="274" x2="120" y2="426"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Bowl Upper: N1 → N2 -->
  <path d="M 142 74 Q 320 66 276 128"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Bowl Lower: N2 → N3b -->
  <path d="M 276 168 Q 260 220 237 246"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Horizontal Bar: N3 → N3b -->
  <line x1="142" y1="252" x2="193" y2="252"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Shared Diagonal: N3b → N5 (R leg = V left arm) -->
  <line x1="228" y1="268" x2="313" y2="432"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- V Right Arm: N5 → N6 -->
  <line x1="337" y1="432" x2="410" y2="135"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>

  <!-- ═══ Signal Particles ═══ -->
  <g opacity="0.35">
    <!-- R spine -->
    <circle cx="120" cy="145" r="2" fill="#a5f3fc"/>
    <circle cx="120" cy="195" r="1.5" fill="#a5f3fc"/>
    <circle cx="120" cy="340" r="2" fill="#a5f3fc"/>
    <circle cx="120" cy="400" r="1.5" fill="#a5f3fc"/>
    <!-- R bowl -->
    <circle cx="210" cy="70" r="1.5" fill="#a5f3fc"/>
    <circle cx="290" cy="88" r="2" fill="#a5f3fc"/>
    <circle cx="270" cy="195" r="1.5" fill="#a5f3fc"/>
    <!-- Shared diagonal (signal flowing R→V) -->
    <circle cx="255" cy="325" r="2.5" fill="#a5f3fc"/>
    <circle cx="285" cy="385" r="2" fill="#a5f3fc"/>
    <!-- V right arm -->
    <circle cx="390" cy="210" r="2" fill="#a5f3fc"/>
    <circle cx="365" cy="330" r="1.5" fill="#a5f3fc"/>
  </g>

  <!-- ═══ NODES ═══ -->
  <!-- N1 — R top -->
  <circle cx="120" cy="72" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="120" cy="72" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="120" cy="72" r="4.5" fill="#ffffff"/>
  <!-- N2 — bowl apex -->
  <circle cx="280" cy="148" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="280" cy="148" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="280" cy="148" r="4.5" fill="#ffffff"/>
  <!-- N3 — junction -->
  <circle cx="120" cy="252" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="120" cy="252" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="120" cy="252" r="4.5" fill="#ffffff"/>
  <!-- N3b — kick / shared diagonal start -->
  <circle cx="215" cy="252" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="215" cy="252" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="215" cy="252" r="4.5" fill="#ffffff"/>
  <!-- N4 — spine terminal -->
  <circle cx="120" cy="448" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="120" cy="448" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="120" cy="448" r="4.5" fill="#ffffff"/>
  <!-- N5 — shared bottom (confluence — larger node) -->
  <circle cx="325" cy="448" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="325" cy="448" r="12" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="325" cy="448" r="6" fill="#ffffff"/>
  <!-- N6 — V right arm top -->
  <circle cx="420" cy="115" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="420" cy="115" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="420" cy="115" r="4.5" fill="#ffffff"/>
</svg>
