<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>

    <!-- Axon segment gradient -->
    <linearGradient id="axon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Node gap glow — tighter, brighter -->
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Axon body glow -->
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Branch tip glow -->
    <filter id="tipGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Large ambient pulse around nodes -->
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- ============================================ -->
  <!-- MAIN AXON — centered diagonal, bolder       -->
  <!-- Runs from ~(115, 400) to ~(330, 155)         -->
  <!-- ============================================ -->

  <!-- Axon segment 1: entry from lower-left -->
  <path d="M 115 400 Q 140 372 165 340"
        stroke="url(#axon)" stroke-width="18" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- NODE GAP 1 -->
  <circle cx="176" cy="325" r="28" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="176" cy="325" r="8" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="176" cy="325" r="4" fill="#ffffff"/>

  <!-- Axon segment 2 -->
  <path d="M 190 308 Q 218 270 245 238"
        stroke="url(#axon)" stroke-width="17" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- NODE GAP 2 (slightly larger — the "main" node) -->
  <circle cx="256" cy="222" r="32" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.14"
          filter="url(#pulseGlow)"/>
  <circle cx="256" cy="222" r="10" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="256" cy="222" r="5" fill="#ffffff"/>

  <!-- Axon segment 3 -->
  <path d="M 270 205 Q 295 175 320 150"
        stroke="url(#axon)" stroke-width="15" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- NODE GAP 3 -->
  <circle cx="330" cy="138" r="26" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="330" cy="138" r="7" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="330" cy="138" r="3.5" fill="#ffffff"/>

  <!-- ============================================ -->
  <!-- BRANCHING TREE — fewer, bolder branches      -->
  <!-- Fans from node 3 toward upper-right          -->
  <!-- ============================================ -->

  <!-- Trunk from node 3 -->
  <path d="M 342 125 Q 358 110 372 100"
        stroke="#0891b2" stroke-width="12" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.85"/>

  <!-- Branch A: upper -->
  <path d="M 372 100 Q 395 80 420 68"
        stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.8"/>
  <circle cx="420" cy="68" r="4" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.85"/>

  <!-- Branch B: middle -->
  <path d="M 372 100 Q 400 98 430 102"
        stroke="#0ea5e9" stroke-width="7" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.75"/>
  <circle cx="430" cy="102" r="3.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>

  <!-- Branch C: lower -->
  <path d="M 372 100 Q 392 118 412 138"
        stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.7"/>
  <circle cx="412" cy="138" r="3" fill="#5eead4" filter="url(#tipGlow)" opacity="0.75"/>

  <!-- ============================================ -->
  <!-- MYELIN SHEATH — subtle parallel lines        -->
  <!-- ============================================ -->
  <g opacity="0.1" stroke="#67e8f9" stroke-width="1" fill="none">
    <path d="M 120 394 Q 143 368 167 338" transform="translate(6,-7)"/>
    <path d="M 120 394 Q 143 368 167 338" transform="translate(-6,7)"/>
    <path d="M 194 303 Q 220 267 246 236" transform="translate(5,-6)"/>
    <path d="M 194 303 Q 220 267 246 236" transform="translate(-5,6)"/>
    <path d="M 273 201 Q 297 173 320 149" transform="translate(5,-5)"/>
    <path d="M 273 201 Q 297 173 320 149" transform="translate(-5,5)"/>
  </g>

  <!-- ============================================ -->
  <!-- SIGNAL PARTICLES — data flow dots            -->
  <!-- ============================================ -->
  <g opacity="0.35">
    <circle cx="128" cy="385" r="2" fill="#a5f3fc"/>
    <circle cx="150" cy="355" r="1.5" fill="#a5f3fc"/>
    <circle cx="205" cy="290" r="2" fill="#a5f3fc"/>
    <circle cx="230" cy="255" r="1.5" fill="#a5f3fc"/>
    <circle cx="285" cy="190" r="2" fill="#a5f3fc"/>
    <circle cx="308" cy="162" r="1.5" fill="#a5f3fc"/>
    <circle cx="355" cy="108" r="2" fill="#a5f3fc"/>
  </g>
</svg>
