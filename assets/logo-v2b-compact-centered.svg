<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <linearGradient id="axon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- COMPACT LAYOUT: everything pulled toward center -->
  <!-- Axon runs from ~(120,385) to ~(295,175), tree fills to ~(430,80) -->
  <!-- Whole composition centered around (256,256) -->

  <!-- Segment 1 -->
  <path d="M 120 385 Q 148 355 172 322"
        stroke="url(#axon)" stroke-width="20" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 1 -->
  <circle cx="182" cy="308" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.13"
          filter="url(#pulseGlow)"/>
  <circle cx="182" cy="308" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="182" cy="308" r="4.5" fill="#ffffff"/>

  <!-- Segment 2 (through the center) -->
  <path d="M 196 292 Q 224 258 250 228"
        stroke="url(#axon)" stroke-width="19" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 2 — dead center of the canvas -->
  <circle cx="260" cy="215" r="34" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.15"
          filter="url(#pulseGlow)"/>
  <circle cx="260" cy="215" r="11" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="260" cy="215" r="5.5" fill="#ffffff"/>

  <!-- Segment 3 -->
  <path d="M 274 198 Q 292 178 310 160"
        stroke="url(#axon)" stroke-width="16" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- BRANCHING — starts at ~(310,160), fills to edges -->

  <!-- Trunk -->
  <path d="M 310 160 Q 332 138 355 120"
        stroke="#0891b2" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.85"/>

  <!-- Branch A: upper — long reach -->
  <path d="M 355 120 Q 380 95 408 75"
        stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.82"/>
  <circle cx="408" cy="75" r="5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.85"/>

  <!-- Branch B: middle — long reach -->
  <path d="M 355 120 Q 388 118 420 122"
        stroke="#0ea5e9" stroke-width="8.5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.78"/>
  <circle cx="420" cy="122" r="4.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>

  <!-- Branch C: lower — long reach -->
  <path d="M 355 120 Q 378 148 400 175"
        stroke="#0ea5e9" stroke-width="7.5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.72"/>
  <circle cx="400" cy="175" r="4" fill="#5eead4" filter="url(#tipGlow)" opacity="0.75"/>

  <!-- Entry tail — extends axon slightly into lower-left for balance -->
  <path d="M 120 385 Q 108 398 95 412"
        stroke="#0e7490" stroke-width="16" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.5"/>

  <!-- Myelin sheath -->
  <g opacity="0.1" stroke="#67e8f9" stroke-width="1.2" fill="none">
    <path d="M 125 380 Q 150 352 174 320" transform="translate(7,-7)"/>
    <path d="M 125 380 Q 150 352 174 320" transform="translate(-7,7)"/>
    <path d="M 200 288 Q 226 255 252 226" transform="translate(6,-6)"/>
    <path d="M 200 288 Q 226 255 252 226" transform="translate(-6,6)"/>
    <path d="M 277 195 Q 294 176 310 159" transform="translate(5,-5)"/>
    <path d="M 277 195 Q 294 176 310 159" transform="translate(-5,5)"/>
  </g>

  <!-- Signal particles -->
  <g opacity="0.35">
    <circle cx="100" cy="405" r="2" fill="#a5f3fc"/>
    <circle cx="140" cy="368" r="2" fill="#a5f3fc"/>
    <circle cx="210" cy="278" r="2" fill="#a5f3fc"/>
    <circle cx="240" cy="242" r="1.5" fill="#a5f3fc"/>
    <circle cx="290" cy="182" r="2" fill="#a5f3fc"/>
    <circle cx="335" cy="138" r="1.5" fill="#a5f3fc"/>
  </g>
</svg>
