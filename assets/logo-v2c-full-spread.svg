<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <linearGradient id="axon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="axonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- FULL SPREAD: axon uses ~40% of space, tree uses ~40%, balanced -->
  <!-- The tree is a real branching structure, not just 3 stubs -->

  <!-- Segment 1 -->
  <path d="M 80 432 Q 108 398 132 362"
        stroke="url(#axon)" stroke-width="20" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 1 -->
  <circle cx="142" cy="348" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.13"
          filter="url(#pulseGlow)"/>
  <circle cx="142" cy="348" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="142" cy="348" r="4.5" fill="#ffffff"/>

  <!-- Segment 2 -->
  <path d="M 156 332 Q 178 300 200 270"
        stroke="url(#axon)" stroke-width="18" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- Node 2 -->
  <circle cx="210" cy="256" r="34" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.15"
          filter="url(#pulseGlow)"/>
  <circle cx="210" cy="256" r="11" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="210" cy="256" r="5.5" fill="#ffffff"/>

  <!-- Segment 3 (short — transitions quickly to tree) -->
  <path d="M 224 240 Q 240 218 255 200"
        stroke="url(#axon)" stroke-width="16" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>

  <!-- ============================================ -->
  <!-- LARGE BRANCHING TREE — fills upper-right half -->
  <!-- 2 levels of branching for ART feel            -->
  <!-- ============================================ -->

  <!-- Main trunk -->
  <path d="M 255 200 Q 278 175 300 155"
        stroke="#0891b2" stroke-width="14" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.88"/>

  <!-- === PRIMARY BRANCH A: upper === -->
  <path d="M 300 155 Q 330 125 360 100"
        stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.82"/>
  <!-- A leaf 1 -->
  <path d="M 360 100 Q 380 82 402 68"
        stroke="#38bdf8" stroke-width="6" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.75"/>
  <circle cx="402" cy="68" r="5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.85"/>
  <!-- A leaf 2 -->
  <path d="M 360 100 Q 388 98 415 100"
        stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.7"/>
  <circle cx="415" cy="100" r="4.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>

  <!-- === PRIMARY BRANCH B: middle === -->
  <path d="M 300 155 Q 340 152 375 155"
        stroke="#0ea5e9" stroke-width="9" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.78"/>
  <!-- B leaf 1 -->
  <path d="M 375 155 Q 400 145 425 138"
        stroke="#38bdf8" stroke-width="5.5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.7"/>
  <circle cx="425" cy="138" r="4.5" fill="#67e8f9" filter="url(#tipGlow)" opacity="0.8"/>
  <!-- B leaf 2 -->
  <path d="M 375 155 Q 400 165 425 172"
        stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.65"/>
  <circle cx="425" cy="172" r="4" fill="#38bdf8" filter="url(#tipGlow)" opacity="0.75"/>

  <!-- === PRIMARY BRANCH C: lower === -->
  <path d="M 300 155 Q 328 182 355 210"
        stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.72"/>
  <!-- C leaf 1 -->
  <path d="M 355 210 Q 380 210 405 208"
        stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.65"/>
  <circle cx="405" cy="208" r="4" fill="#5eead4" filter="url(#tipGlow)" opacity="0.75"/>
  <!-- C leaf 2 -->
  <path d="M 355 210 Q 372 232 390 252"
        stroke="#2dd4bf" stroke-width="4.5" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.6"/>
  <circle cx="390" cy="252" r="3.5" fill="#5eead4" filter="url(#tipGlow)" opacity="0.7"/>

  <!-- Myelin sheath -->
  <g opacity="0.1" stroke="#67e8f9" stroke-width="1.2" fill="none">
    <path d="M 85 426 Q 112 394 134 360" transform="translate(7,-8)"/>
    <path d="M 85 426 Q 112 394 134 360" transform="translate(-7,8)"/>
    <path d="M 160 328 Q 180 298 202 268" transform="translate(6,-6)"/>
    <path d="M 160 328 Q 180 298 202 268" transform="translate(-6,6)"/>
    <path d="M 227 237 Q 242 216 256 199" transform="translate(5,-5)"/>
    <path d="M 227 237 Q 242 216 256 199" transform="translate(-5,5)"/>
  </g>

  <!-- Signal particles -->
  <g opacity="0.35">
    <circle cx="95" cy="418" r="2" fill="#a5f3fc"/>
    <circle cx="122" cy="380" r="1.5" fill="#a5f3fc"/>
    <circle cx="170" cy="315" r="2" fill="#a5f3fc"/>
    <circle cx="192" cy="282" r="1.5" fill="#a5f3fc"/>
    <circle cx="240" cy="222" r="2" fill="#a5f3fc"/>
    <circle cx="278" cy="170" r="1.5" fill="#a5f3fc"/>
  </g>
</svg>
