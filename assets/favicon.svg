<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#091a30"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#cffafe"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Option A: 6 even spokes, pointed tips, clean star feel -->

  <!-- Spokes -->
  <g stroke="#06b6d4" stroke-width="20" stroke-linecap="round" filter="url(#glow)">
    <!-- Up -->
    <line x1="256" y1="180" x2="256" y2="68"/>
    <!-- Down -->
    <line x1="256" y1="332" x2="256" y2="444"/>
    <!-- Upper-right -->
    <line x1="322" y1="218" x2="419" y2="162"/>
    <!-- Lower-right -->
    <line x1="322" y1="294" x2="419" y2="350"/>
    <!-- Upper-left -->
    <line x1="190" y1="218" x2="93" y2="162"/>
    <!-- Lower-left -->
    <line x1="190" y1="294" x2="93" y2="350"/>
  </g>

  <!-- Spoke tip nodes -->
  <g>
    <circle cx="256" cy="60" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="256" cy="452" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="425" cy="158" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="425" cy="354" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="87" cy="158" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="87" cy="354" r="10" fill="#67e8f9" filter="url(#glow)"/>
  </g>

  <!-- Center core -->
  <circle cx="256" cy="256" r="55" fill="#22d3ee" opacity="0.15" filter="url(#bigGlow)"/>
  <circle cx="256" cy="256" r="36" fill="#a5f3fc" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="20" fill="#ffffff"/>
</svg>
