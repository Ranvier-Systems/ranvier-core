<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulseGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!--
    IDEA 1 — "Neural Bridge"
    R's leg diagonal continues seamlessly into V's left arm.
    One continuous signal path flows from R through V.

    Nodes (7):
      N1  (115, 72)   — R top
      N2  (240, 148)  — R bowl apex
      N3  (115, 228)  — R junction
      N3b (190, 228)  — R kick / bridge start
      N4  (115, 448)  — R spine terminal
      N5  (315, 448)  — bridge bottom / V bottom
      N6  (425, 72)   — V right top
  -->

  <!-- ═══ SEGMENTS ═══ -->
  <!-- Upper Spine: N1 → N3 -->
  <line x1="115" y1="94" x2="115" y2="206"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Lower Spine: N3 → N4 -->
  <line x1="115" y1="250" x2="115" y2="426"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Bowl Upper: N1 → N2 -->
  <path d="M 136 74 Q 280 68 236 128"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Bowl Lower: N2 → N3b -->
  <path d="M 236 168 Q 220 210 212 224"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Horizontal Bar: N3 → N3b -->
  <line x1="136" y1="228" x2="168" y2="228"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- Bridge: N3b → N5 (R leg = V left arm) -->
  <line x1="202" y1="244" x2="303" y2="432"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>
  <!-- V Right Arm: N5 → N6 -->
  <line x1="327" y1="432" x2="413" y2="92"
        stroke="#0891b2" stroke-width="18" stroke-linecap="round"/>

  <!-- ═══ Signal Particles ═══ -->
  <g opacity="0.35">
    <circle cx="115" cy="140" r="2" fill="#a5f3fc"/>
    <circle cx="115" cy="185" r="1.5" fill="#a5f3fc"/>
    <circle cx="115" cy="330" r="2" fill="#a5f3fc"/>
    <circle cx="115" cy="400" r="1.5" fill="#a5f3fc"/>
    <circle cx="195" cy="78" r="1.5" fill="#a5f3fc"/>
    <circle cx="240" cy="96" r="2" fill="#a5f3fc"/>
    <circle cx="230" cy="195" r="1.5" fill="#a5f3fc"/>
    <!-- Bridge particles — signal flowing R→V -->
    <circle cx="235" cy="310" r="2" fill="#a5f3fc"/>
    <circle cx="270" cy="380" r="1.5" fill="#a5f3fc"/>
    <!-- V right arm -->
    <circle cx="385" cy="180" r="2" fill="#a5f3fc"/>
    <circle cx="360" cy="310" r="1.5" fill="#a5f3fc"/>
  </g>

  <!-- ═══ NODES ═══ -->
  <!-- N1 — R top -->
  <circle cx="115" cy="72" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="115" cy="72" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="115" cy="72" r="4.5" fill="#ffffff"/>
  <!-- N2 — bowl apex -->
  <circle cx="240" cy="148" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="240" cy="148" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="240" cy="148" r="4.5" fill="#ffffff"/>
  <!-- N3 — junction -->
  <circle cx="115" cy="228" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="115" cy="228" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="115" cy="228" r="4.5" fill="#ffffff"/>
  <!-- N3b — kick / bridge start -->
  <circle cx="190" cy="228" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="190" cy="228" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="190" cy="228" r="4.5" fill="#ffffff"/>
  <!-- N4 — spine terminal -->
  <circle cx="115" cy="448" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="115" cy="448" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="115" cy="448" r="4.5" fill="#ffffff"/>
  <!-- N5 — bridge bottom / V bottom (largest — confluence node) -->
  <circle cx="315" cy="448" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="315" cy="448" r="11" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="315" cy="448" r="5.5" fill="#ffffff"/>
  <!-- N6 — V right top -->
  <circle cx="425" cy="72" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.12"
          filter="url(#pulseGlow)"/>
  <circle cx="425" cy="72" r="9" fill="#cffafe" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="425" cy="72" r="4.5" fill="#ffffff"/>
</svg>
