<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#091a30"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="none" stroke="#164e63" stroke-width="6"/>

  <!-- Option C: Organic/neural — 5 asymmetric spokes with branching tips -->

  <!-- Main spokes — varying lengths for organic feel -->
  <g stroke="#06b6d4" stroke-width="22" stroke-linecap="round" filter="url(#glow)">
    <!-- Up-right -->
    <line x1="280" y1="200" x2="380" y2="68"/>
    <!-- Right -->
    <line x1="320" y1="270" x2="448" y2="290"/>
    <!-- Down -->
    <line x1="240" y1="320" x2="210" y2="450"/>
    <!-- Down-left -->
    <line x1="200" y1="300" x2="80" y2="400"/>
    <!-- Up-left -->
    <line x1="200" y1="210" x2="90" y2="120"/>
  </g>

  <!-- Branch forks at tips — thinner -->
  <g stroke="#0891b2" stroke-width="10" stroke-linecap="round" filter="url(#glow)">
    <!-- Up-right branches -->
    <line x1="380" y1="68" x2="420" y2="42"/>
    <line x1="380" y1="68" x2="350" y2="38"/>
    <!-- Right branches -->
    <line x1="448" y1="290" x2="470" y2="258"/>
    <line x1="448" y1="290" x2="472" y2="322"/>
    <!-- Down branches -->
    <line x1="210" y1="450" x2="178" y2="472"/>
    <line x1="210" y1="450" x2="240" y2="476"/>
    <!-- Down-left branches -->
    <line x1="80" y1="400" x2="58" y2="378"/>
    <line x1="80" y1="400" x2="56" y2="426"/>
    <!-- Up-left branches -->
    <line x1="90" y1="120" x2="62" y2="108"/>
    <line x1="90" y1="120" x2="78" y2="88"/>
  </g>

  <!-- Junction nodes at fork points -->
  <g>
    <circle cx="380" cy="68" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="448" cy="290" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="210" cy="450" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="80" cy="400" r="10" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="90" cy="120" r="10" fill="#67e8f9" filter="url(#glow)"/>
  </g>

  <!-- Branch tip dots -->
  <g opacity="0.8">
    <circle cx="420" cy="42" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="350" cy="38" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="470" cy="258" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="472" cy="322" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="178" cy="472" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="240" cy="476" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="58" cy="378" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="56" cy="426" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="62" cy="108" r="5" fill="#a5f3fc" filter="url(#glow)"/>
    <circle cx="78" cy="88" r="5" fill="#a5f3fc" filter="url(#glow)"/>
  </g>

  <!-- Center core — large, bright -->
  <circle cx="256" cy="260" r="65" fill="#22d3ee" opacity="0.1" filter="url(#bigGlow)"/>
  <circle cx="256" cy="260" r="44" fill="#a5f3fc" filter="url(#softGlow)" opacity="0.85"/>
  <circle cx="256" cy="260" r="24" fill="#ffffff"/>
</svg>
