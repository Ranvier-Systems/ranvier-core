<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>

    <!-- Axon segment gradients -->
    <linearGradient id="axonDown" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="axonRight" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="axonReturn" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="axonKick" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="axonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="haloGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!--
    LETTER R — 5 axon segments, 5 nodes (Nodes of Ranvier)

    Structure:
      N1 (top-left)     — spine top + bowl departure
      N2 (bowl apex)    — mid-bowl node, smaller (splits bowl into 2 axons)
      N3 (junction)     — KEY: bowl return + spine + leg (largest node)
      N4 (spine bottom) — spine terminal
      N5 (leg tip)      — leg terminal

    Segments:
      S1: N1 → N3  upper spine
      S2: N3 → N4  lower spine
      S3: N1 → N2  bowl first half (curves outward)
      S4: N2 → N3  bowl second half (curves back)
      S5: N3 → N5  leg kick

    Positions:
      N1: (155, 78)   N2: (370, 150)   N3: (155, 280)
      N4: (155, 440)  N5: (368, 440)
  -->

  <!-- ═══ SEGMENT S1: Upper Spine — N1 to N3 ═══ -->
  <line x1="155" y1="96" x2="155" y2="262"
        stroke="url(#axonDown)" stroke-width="21" stroke-linecap="round"
        filter="url(#axonGlow)" opacity="0.92"/>
  <!-- Myelin sheath -->
  <line x1="165" y1="100" x2="165" y2="258" stroke="#67e8f9" stroke-width="0.7" opacity="0.1"/>
  <line x1="145" y1="100" x2="145" y2="258" stroke="#67e8f9" stroke-width="0.7" opacity="0.1"/>
  <!-- Signal particles -->
  <circle cx="155" cy="135" r="1.8" fill="#a5f3fc" opacity="0.4"/>
  <circle cx="155" cy="180" r="1.4" fill="#a5f3fc" opacity="0.3"/>
  <circle cx="155" cy="225" r="1.6" fill="#a5f3fc" opacity="0.35"/>

  <!-- ═══ SEGMENT S2: Lower Spine — N3 to N4 ═══ -->
  <line x1="155" y1="298" x2="155" y2="422"
        stroke="url(#axonDown)" stroke-width="21" stroke-linecap="round"
        filter="url(#axonGlow)" opacity="0.92"/>
  <!-- Myelin sheath -->
  <line x1="165" y1="302" x2="165" y2="418" stroke="#67e8f9" stroke-width="0.7" opacity="0.1"/>
  <line x1="145" y1="302" x2="145" y2="418" stroke="#67e8f9" stroke-width="0.7" opacity="0.1"/>
  <!-- Signal particles -->
  <circle cx="155" cy="340" r="1.4" fill="#a5f3fc" opacity="0.3"/>
  <circle cx="155" cy="388" r="1.8" fill="#a5f3fc" opacity="0.35"/>

  <!-- ═══ SEGMENT S3: Bowl First Half — N1 to N2 (curve outward) ═══ -->
  <path d="M 174 82 Q 255 50 328 72 Q 372 88 380 132"
        stroke="url(#axonRight)" stroke-width="19" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>
  <!-- Myelin sheath -->
  <path d="M 174 82 Q 255 50 328 72 Q 372 88 380 132"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(0,-6)"/>
  <path d="M 174 82 Q 255 50 328 72 Q 372 88 380 132"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(0,6)"/>
  <!-- Signal particles -->
  <circle cx="235" cy="58" r="1.6" fill="#a5f3fc" opacity="0.35"/>
  <circle cx="315" cy="70" r="1.4" fill="#a5f3fc" opacity="0.3"/>
  <circle cx="362" cy="102" r="1.8" fill="#a5f3fc" opacity="0.4"/>

  <!-- ═══ SEGMENT S4: Bowl Second Half — N2 to N3 (curve back) ═══ -->
  <path d="M 374 168 Q 368 220 318 255 Q 262 286 174 282"
        stroke="url(#axonReturn)" stroke-width="19" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.9"/>
  <!-- Myelin sheath -->
  <path d="M 374 168 Q 368 220 318 255 Q 262 286 174 282"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(0,-6)"/>
  <path d="M 374 168 Q 368 220 318 255 Q 262 286 174 282"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(0,6)"/>
  <!-- Signal particles -->
  <circle cx="362" cy="200" r="1.4" fill="#a5f3fc" opacity="0.3"/>
  <circle cx="312" cy="252" r="1.8" fill="#a5f3fc" opacity="0.35"/>
  <circle cx="238" cy="278" r="1.4" fill="#a5f3fc" opacity="0.3"/>

  <!-- ═══ SEGMENT S5: Leg Kick — N3 to N5 ═══ -->
  <path d="M 174 294 Q 242 348 302 394 Q 342 422 352 434"
        stroke="url(#axonKick)" stroke-width="18" stroke-linecap="round" fill="none"
        filter="url(#axonGlow)" opacity="0.88"/>
  <!-- Myelin sheath -->
  <path d="M 174 294 Q 242 348 302 394 Q 342 422 352 434"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(-5,5)"/>
  <path d="M 174 294 Q 242 348 302 394 Q 342 422 352 434"
        stroke="#67e8f9" stroke-width="0.7" fill="none" opacity="0.09"
        transform="translate(5,-5)"/>
  <!-- Signal particles -->
  <circle cx="225" cy="335" r="1.8" fill="#a5f3fc" opacity="0.35"/>
  <circle cx="282" cy="380" r="1.4" fill="#a5f3fc" opacity="0.3"/>
  <circle cx="332" cy="418" r="1.6" fill="#a5f3fc" opacity="0.35"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- NODES — at every segment connection point  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- NODE N1 — top-left: spine start + bowl departure -->
  <circle cx="155" cy="78" r="22" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.12"
          filter="url(#haloGlow)"/>
  <circle cx="155" cy="78" r="10" fill="#b2f5ea" filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="155" cy="78" r="4.5" fill="#e0fcff"/>
  <circle cx="155" cy="78" r="2.2" fill="#ffffff"/>

  <!-- NODE N2 — bowl apex: smaller mid-bowl node splitting the curve -->
  <circle cx="377" cy="150" r="18" fill="none" stroke="#67e8f9" stroke-width="0.9" opacity="0.1"
          filter="url(#haloGlow)"/>
  <circle cx="377" cy="150" r="8" fill="#b2f5ea" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="377" cy="150" r="3.5" fill="#e0fcff"/>
  <circle cx="377" cy="150" r="1.8" fill="#ffffff"/>

  <!-- NODE N3 — KEY JUNCTION: bowl return + spine + leg (largest) -->
  <circle cx="155" cy="280" r="30" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.16"
          filter="url(#haloGlow)"/>
  <circle cx="155" cy="280" r="13" fill="#b2f5ea" filter="url(#nodeGlow)" opacity="0.95"/>
  <circle cx="155" cy="280" r="6" fill="#e0fcff"/>
  <circle cx="155" cy="280" r="2.8" fill="#ffffff"/>

  <!-- NODE N4 — spine terminal: bottom-left -->
  <circle cx="155" cy="438" r="20" fill="none" stroke="#67e8f9" stroke-width="0.9" opacity="0.1"
          filter="url(#haloGlow)"/>
  <circle cx="155" cy="438" r="9" fill="#b2f5ea" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="155" cy="438" r="4" fill="#e0fcff"/>
  <circle cx="155" cy="438" r="2" fill="#ffffff"/>

  <!-- NODE N5 — leg terminal: bottom-right -->
  <circle cx="362" cy="442" r="20" fill="none" stroke="#67e8f9" stroke-width="0.9" opacity="0.1"
          filter="url(#haloGlow)"/>
  <circle cx="362" cy="442" r="9" fill="#b2f5ea" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="362" cy="442" r="4" fill="#e0fcff"/>
  <circle cx="362" cy="442" r="2" fill="#ffffff"/>
</svg>
