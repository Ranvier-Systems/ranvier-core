apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ranvier.configMapName" . }}
  labels:
    {{- include "ranvier.labels" . | nindent 4 }}
data:
  ranvier.yaml: |
    # Ranvier Core Configuration
    # Generated by Helm chart {{ .Chart.Name }}-{{ .Chart.Version }}

    server:
      bind_address: "0.0.0.0"
      api_port: {{ .Values.config.apiPort }}
      metrics_port: {{ .Values.config.metricsPort }}

    database:
      path: {{ .Values.config.database.path | quote }}
      journal_mode: {{ .Values.config.database.journalMode | quote }}
      synchronous: {{ .Values.config.database.synchronous | quote }}

    health:
      check_interval_seconds: {{ .Values.config.health.checkIntervalSeconds }}
      check_timeout_seconds: {{ .Values.config.health.checkTimeoutSeconds }}
      failure_threshold: {{ .Values.config.health.failureThreshold }}
      recovery_threshold: {{ .Values.config.health.recoveryThreshold }}

    pool:
      max_connections_per_host: {{ .Values.config.pool.maxConnectionsPerHost }}
      max_total_connections: {{ .Values.config.pool.maxTotalConnections }}
      idle_timeout_seconds: {{ .Values.config.pool.idleTimeoutSeconds }}
      tcp_nodelay: {{ .Values.config.pool.tcpNoDelay }}

    routing:
      routing_mode: {{ .Values.config.routingMode | quote }}
      prefix_token_length: {{ .Values.config.prefixTokenLength }}
      min_token_length: {{ .Values.config.routing.minTokenLength }}
      backend_retry_limit: {{ .Values.config.routing.backendRetryLimit }}
      block_alignment: {{ .Values.config.routing.blockAlignment }}
      max_routes: {{ .Values.config.routing.maxRoutes }}
      ttl_seconds: {{ .Values.config.routing.ttlSeconds }}
      backend_drain_timeout_seconds: {{ .Values.config.routing.backendDrainTimeoutSeconds }}
      accept_client_tokens: {{ .Values.config.routing.acceptClientTokens }}
      max_token_id: {{ .Values.config.routing.maxTokenId }}

    timeouts:
      connect_timeout_seconds: {{ .Values.config.timeouts.connectTimeoutSeconds }}
      request_timeout_seconds: {{ .Values.config.timeouts.requestTimeoutSeconds }}

    rate_limit:
      enabled: {{ .Values.config.rateLimit.enabled }}
      requests_per_second: {{ .Values.config.rateLimit.requestsPerSecond }}
      burst_size: {{ .Values.config.rateLimit.burstSize }}

    retry:
      max_retries: {{ .Values.config.retry.maxRetries }}
      initial_backoff_ms: {{ .Values.config.retry.initialBackoffMs }}
      max_backoff_ms: {{ .Values.config.retry.maxBackoffMs }}
      backoff_multiplier: {{ .Values.config.retry.backoffMultiplier }}

    circuit_breaker:
      enabled: {{ .Values.config.circuitBreaker.enabled }}
      failure_threshold: {{ .Values.config.circuitBreaker.failureThreshold }}
      success_threshold: {{ .Values.config.circuitBreaker.successThreshold }}
      recovery_timeout_seconds: {{ .Values.config.circuitBreaker.recoveryTimeoutSeconds }}
      fallback_enabled: {{ .Values.config.circuitBreaker.fallbackEnabled }}

    shutdown:
      drain_timeout_seconds: {{ .Values.config.shutdown.drainTimeoutSeconds }}

    {{- if .Values.cluster.enabled }}
    cluster:
      enabled: true
      gossip_port: {{ .Values.cluster.gossipPort }}
      gossip_interval_ms: {{ .Values.cluster.gossipIntervalMs }}
      gossip_heartbeat_interval_seconds: {{ .Values.cluster.heartbeatIntervalSeconds }}
      gossip_peer_timeout_seconds: {{ .Values.cluster.peerTimeoutSeconds }}
      gossip_reliable_delivery: {{ .Values.cluster.reliableDelivery }}
      gossip_ack_timeout_ms: {{ .Values.cluster.ackTimeoutMs }}
      gossip_max_retries: {{ .Values.cluster.maxRetries }}
      gossip_dedup_window: {{ .Values.cluster.dedupWindow }}
      discovery_dns_name: {{ include "ranvier.gossipDnsName" . | quote }}
      discovery_type: "A"
      discovery_refresh_interval_seconds: {{ .Values.cluster.discoveryRefreshIntervalSeconds }}
    {{- end }}

    {{- if .Values.backends.discovery.enabled }}
    k8s_discovery:
      enabled: true
      namespace: {{ include "ranvier.backendNamespace" . | quote }}
      service_name: {{ .Values.backends.discovery.serviceName | quote }}
      target_port: {{ .Values.backends.discovery.targetPort }}
      {{- if .Values.backends.discovery.labelSelector }}
      label_selector: {{ .Values.backends.discovery.labelSelector | quote }}
      {{- end }}
      poll_interval_seconds: {{ .Values.backends.discovery.pollIntervalSeconds }}
      verify_tls: {{ .Values.backends.discovery.verifyTls }}
    {{- end }}

    {{- if .Values.telemetry.enabled }}
    telemetry:
      enabled: true
      otlp_endpoint: {{ .Values.telemetry.otlpEndpoint | quote }}
      service_name: {{ .Values.telemetry.serviceName | quote }}
      sample_rate: {{ .Values.telemetry.sampleRate }}
      export_interval_ms: {{ .Values.telemetry.exportIntervalMs }}
      max_queue_size: {{ .Values.telemetry.maxQueueSize }}
      max_export_batch_size: {{ .Values.telemetry.maxExportBatchSize }}
    {{- end }}

    {{- if .Values.config.tls.enabled }}
    tls:
      enabled: true
      cert_path: "/etc/ranvier/tls/tls.crt"
      key_path: "/etc/ranvier/tls/tls.key"
    {{- end }}
