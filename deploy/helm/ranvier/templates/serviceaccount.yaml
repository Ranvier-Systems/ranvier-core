{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ranvier.serviceAccountName" . }}
  labels:
    {{- include "ranvier.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
{{- if .Values.backends.discovery.enabled }}
---
# RBAC for Kubernetes EndpointSlice discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ranvier.fullname" . }}-discovery
  labels:
    {{- include "ranvier.labels" . | nindent 4 }}
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ranvier.fullname" . }}-discovery
  labels:
    {{- include "ranvier.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ranvier.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "ranvier.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
