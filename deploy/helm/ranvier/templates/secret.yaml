{{- if and (not .Values.auth.existingSecret) .Values.auth.apiKeys }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ranvier.secretName" . }}
  labels:
    {{- include "ranvier.labels" . | nindent 4 }}
type: Opaque
stringData:
  # API keys configuration
  # The first key with admin role is used as RANVIER_ADMIN_API_KEY for backward compatibility
  {{- $adminKey := "" }}
  {{- range .Values.auth.apiKeys }}
  {{- if and (not $adminKey) (has "admin" .roles) }}
  {{- $adminKey = .key }}
  {{- end }}
  {{- end }}
  {{- if $adminKey }}
  RANVIER_ADMIN_API_KEY: {{ $adminKey | quote }}
  {{- end }}

  # Full API keys YAML for multi-key support
  api-keys.yaml: |
    auth:
      api_keys:
        {{- range .Values.auth.apiKeys }}
        - key: {{ .key | quote }}
          name: {{ .name | quote }}
          {{- if .expires }}
          expires: {{ .expires | quote }}
          {{- end }}
          {{- if .roles }}
          roles:
            {{- range .roles }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
        {{- end }}
{{- end }}
