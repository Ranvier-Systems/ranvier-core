# Unit tests (ctest / gtest) for Ranvier Core
# Builds the `test` stage of Dockerfile.production.fast against the pre-built
# base image and runs ctest inside the resulting image.
#
# Triggers:
#   - After Docker Publish workflow completes (shares GHA build cache so the
#     builder layer is reused; only the test-stage ninja step is incremental).
#   - Manual trigger via workflow_dispatch for running against a specific ref.
#
# NOTE: The test stage is not part of the published production image. It only
# exists to run unit tests in CI with the same toolchain used for release.
name: Unit Tests

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/ranvier-systems/ranvier-base:latest

jobs:
  unit-tests:
    # Run on manual dispatch unconditionally, or after a successful Docker Publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the test-stage image. cache-from reuses the builder layer from
      # the publish job (scope app-amd64); cache-to writes a separate scope
      # so we don't pollute the publish cache with the extra ninja step.
      - name: Build unit-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production.fast
          target: test
          load: true
          tags: ranvier-test:latest
          cache-from: |
            type=gha,scope=app-amd64
            type=gha,scope=unit-tests
          cache-to: type=gha,mode=max,scope=unit-tests
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      - name: Run ctest
        id: tests
        run: |
          mkdir -p unit-test-results
          # Run ctest inside the test image; mount results dir for JUnit XML.
          # --output-junit is supported by CMake 3.21+.
          docker run --rm \
            -v "$(pwd)/unit-test-results:/results" \
            ranvier-test:latest \
            ctest --output-on-failure --output-junit /results/unit-results.xml \
            2>&1 | tee unit-test-results/unit-test.log

          TEST_EXIT=${PIPESTATUS[0]}
          echo "test_exit_code=$TEST_EXIT" >> $GITHUB_OUTPUT
          exit $TEST_EXIT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            unit-test-results/unit-results.xml
            unit-test-results/unit-test.log
          retention-days: 30

      - name: Publish test summary
        uses: dorny/test-reporter@v3
        if: always() && hashFiles('unit-test-results/unit-results.xml') != ''
        with:
          name: Unit Test Results
          path: unit-test-results/unit-results.xml
          reporter: java-junit
          fail-on-error: false
