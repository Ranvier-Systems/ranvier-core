# Sanitizer tests for Ranvier Core
#
# Builds the unit-test suite with -fsanitize=address,undefined inside the
# ranvier-sanitize image (Dockerfile.sanitize) and runs ctest. The intent
# is the empirical sweep called for in BACKLOG §18 — pick up the
# integer-overflow / cast shapes (H2, H9) and any heap UAF on the request
# path that the static audit could not confirm or refute.
#
# Triggers:
#   - After Docker Publish completes (post-merge to main, same shape as
#     unit-tests.yml and fuzz-tests.yml).
#   - Manual via workflow_dispatch (for ad-hoc investigation against any
#     branch).
#
# This workflow does NOT run on PRs (each dispatch costs up to ~60 min of
# `ubuntu-latest` runner time — see the cost note below — which is too
# much for per-PR CI), but IS a post-merge gate: `continue-on-error: false`
# on the sanitised ctest step means a regression in any of the 2322
# sanitised unit tests fails the job and surfaces against the commit
# that introduced it.
#
# Gating-posture history (BACKLOG §18 P2): the workflow was non-gating
# (`continue-on-error: true`, `workflow_dispatch`-only) through follow-ups
# 1–8 while the initial sanitised findings were triaged into sub-tickets
# F1 (PersistenceTest empty-span memcpy → fixed in #492), F2 (Abseil
# raw_hash_set ASan ABI mismatch → fixed in #493 by rebuilding Abseil
# under sanitisers in `Dockerfile.sanitize`) and F3 (RateLimiter wall-clock
# refill flake → fixed in #495 by switching the test to TestClock). F3
# was the last residual; the suite was observed clean on 2026-05-16
# (2322/2322 pass, 44.16 sec wall-clock) on the F3 branch dispatch, and
# gating is restored in this commit. Each dispatch still costs ~60 min
# due to the ~30-min Seastar rebuild in the default-alloc base — the §18
# P3 GHCR-publish spinoff would collapse this to a pull-and-test job
# and drop the per-dispatch cost to a few minutes.
#
# Architecture note: GitHub-hosted runners are x86_64; local runs (e.g.
# Apple Silicon) are aarch64. ASan/UBSan can surface different bugs on
# different ABIs (alignment, integer-cast behaviour); a "passes locally,
# fails in CI" finding is real signal, not a configuration issue.
#
# Default-allocator base image: the first empirical run of this workflow
# crashed inside CTest's `gtest_discover_tests` on
# `cross_shard_exception_propagation_test` with `munmap_chunk(): invalid
# pointer` deep in `libhwloc.so.15` — same Seastar-allocator / no-reactor
# root cause as `stream_parser_fuzz` (Seastar's per-shard allocator
# overrides global `new`/`delete`, the test binary is invoked at build
# time under `--gtest_list_tests` without a running reactor, allocator
# misbehaves). The §18 P3 closure ships the unblock as a shared
# `Dockerfile.base.default-alloc` that rebuilds Seastar with the
# `SEASTAR_DEFAULT_ALLOCATOR` macro propagated through the upstream
# `PUBLIC` compile definitions. This workflow therefore chains two
# buildx steps — base, then sanitize `FROM ranvier-base-default-alloc` —
# mirroring the `stream-parser-fuzz-default-alloc` job in
# `fuzz-tests.yml`. `driver: docker` is required so the second step can
# resolve the locally-loaded base image; the trade-off is that the
# docker driver does not support `cache-to: type=gha`, so the ~30-min
# Seastar rebuild in the default-alloc base is paid in full on every
# dispatch. Acceptable for a non-gating, manual/post-publish workflow.
# When `ranvier-base-default-alloc` is published to GHCR alongside
# `ranvier-base` (§18 P3 "Still pending" follow-up — same spinoff that
# would benefit the `stream-parser-fuzz-default-alloc` job), this
# workflow collapses back to a single-stage build with full GHA caching.
name: Sanitizer Tests

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed
  workflow_dispatch:

# A fast burst of merges to main produces one Docker Publish run per merge
# and therefore one sanitizer-tests run per merge. At ~15 min cache-warm
# (~60 min worst-case on a base-image rebuild), that adds up. Cancel any
# in-progress run on the same ref when a newer one queues: the latest
# commit's sanitiser includes every prior commit's changes anyway, so a
# pass on the latest covers everything up to it, and a fail localises to
# the most recent merge batch. Trade-off: if commit A regresses and commit
# B lands before A's sanitiser finishes, A's run is cancelled and the
# regression first surfaces against B — bisection scope is the A→B
# interval. Standard cancel-in-progress posture for shared-branch CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/ranvier-systems/ranvier-base:latest

jobs:
  sanitizer-tests:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Generous: the first Seastar rebuild in the default-alloc base is
    # ~30 min (no cross-dispatch caching under the docker driver — see
    # the top-of-file note); on subsequent layer-cache hits the job is
    # bounded by the sanitised unit-test run.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Driver=docker (not the default docker-container driver) so the
      # two chained buildx builds below share the runner's local docker
      # image store — the sanitize build's `FROM ranvier-base-default-alloc`
      # has to resolve against the base image we just built one step
      # earlier, and docker-container driver buildx instances can't see
      # the local daemon's images (they'd default to docker.io lookup).
      # Trade-off: the docker driver does not support `cache-to: type=gha`,
      # so the Seastar rebuild in Dockerfile.base.default-alloc is paid in
      # full on every dispatch. Mirrors the `stream-parser-fuzz-default-alloc`
      # job in `fuzz-tests.yml`; the proper fix is the §18 P3 GHCR-publish
      # spinoff, which would let both jobs pull the pre-built base.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the shared default-allocator base on top of the cached
      # ranvier-base. ~30 min on first run; no inter-dispatch caching
      # because of the docker-driver trade-off documented above.
      - name: Build default-allocator base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base.default-alloc
          load: true
          tags: ranvier-base-default-alloc:latest
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      # Layer the sanitizer toolchain (clang + compiler-rt + llvm + lld)
      # on top of the default-allocator base. Re-uses Dockerfile.sanitize
      # unchanged; the BASE_IMAGE build-arg is the only delta from the
      # original single-stage shape. Resolves the FROM against the local
      # docker daemon (loaded by the previous step) because of the docker
      # driver — see "Set up Docker Buildx" above. No cache-from/cache-to
      # here: the docker driver does not support `type=gha`.
      - name: Build sanitizer image on default-allocator base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sanitize
          load: true
          tags: ranvier-sanitize:latest
          build-args: |
            BASE_IMAGE=ranvier-base-default-alloc:latest

      - name: Run unit tests under ASan/UBSan
        run: |
          mkdir -p sanitize-results
          docker run --rm \
            -v "$(pwd):/src" \
            -w /src \
            ranvier-sanitize:latest \
            make sanitize-test \
            2>&1 | tee sanitize-results/sanitize.log

      - name: Upload sanitizer log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanitizer-results
          path: sanitize-results/sanitize.log
          retention-days: 30
