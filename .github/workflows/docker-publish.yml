# Build and publish Docker images to GitHub Container Registry
# Triggers on push to main (latest tag) and version tags (v*)
# Supports both AMD64 and ARM64 via native runners (no QEMU emulation)
#
# NOTE: Uses Dockerfile.production.fast with pre-built base image for speed.
# The base image (ranvier-base) is built separately via docker-base.yml.
name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ranvier-systems/ranvier
  BASE_IMAGE: ghcr.io/ranvier-systems/ranvier-base:latest

jobs:
  # Verify base image exists before building (fail fast)
  check-base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check base image exists
        run: |
          echo "Checking if base image exists: ${{ env.BASE_IMAGE }}"
          if docker manifest inspect ${{ env.BASE_IMAGE }} > /dev/null 2>&1; then
            echo "✓ Base image found: ${{ env.BASE_IMAGE }}"

            # Verify multi-arch support
            echo ""
            echo "Checking available architectures..."
            docker manifest inspect ${{ env.BASE_IMAGE }} | jq -r '.manifests[]? | "\(.platform.architecture) (\(.platform.os))"' || echo "Single-arch image"
          else
            echo "::error::Base image not found: ${{ env.BASE_IMAGE }}"
            echo ""
            echo "=========================================="
            echo "ERROR: Base image does not exist in GHCR"
            echo "=========================================="
            echo ""
            echo "The production build requires a pre-built base image containing"
            echo "Seastar and build dependencies. This image must be built first."
            echo ""
            echo "To fix this, run the 'Docker Base Image' workflow manually:"
            echo ""
            echo "  1. Go to: https://github.com/${{ github.repository }}/actions/workflows/docker-base.yml"
            echo "  2. Click 'Run workflow'"
            echo "  3. Wait for it to complete (~20-30 minutes)"
            echo "  4. Re-run this workflow"
            echo ""
            echo "Or use GitHub CLI:"
            echo "  gh workflow run docker-base.yml"
            echo ""
            exit 1
          fi

  build-and-push:
    needs: [check-base-image]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free up disk space for large Docker builds
      # GitHub runners have limited space (~14GB free)
      - name: Free disk space
        if: matrix.platform == 'linux/amd64'
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image using pre-built base image
      # Note: Docker will automatically pull the correct architecture (ARM64/AMD64)
      # of the BASE_IMAGE because we built it as a multi-arch manifest.
      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production.fast
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=app-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.arch }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            UID=10001
            GID=10001

      - name: Export Digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-app-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform-specific images into a multi-arch manifest
  merge:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-app-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with 'latest' for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with version (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major only (v1.0.0 -> 1)
            type=semver,pattern={{major}}
            # Tag with short commit SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Create Manifest List and Push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect Image
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Generate Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Base Image:** \`${{ env.BASE_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platforms" >> $GITHUB_STEP_SUMMARY
          echo "- \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
