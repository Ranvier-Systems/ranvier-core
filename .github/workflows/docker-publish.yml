# Build and publish Docker images to GitHub Container Registry
# Triggers on push to main (latest tag) and version tags (v*)
#
# NOTE: Uses Dockerfile.production.fast with pre-built base image for speed.
# The base image (ranvier-base) is built separately via docker-base.yml.
# Currently amd64 only - arm64 requires native ARM runners for Seastar builds.
name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ranvier-systems/ranvier
  BASE_IMAGE: ghcr.io/ranvier-systems/ranvier-base:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for attestations
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free up disk space for large Docker builds
      # GitHub runners have limited space (~14GB free)
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          # Remove unnecessary tools to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          echo "=== Disk space after cleanup ==="
          df -h /

      # Set up Docker Buildx for caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Verify base image exists before attempting build
      - name: Check base image exists
        run: |
          echo "Checking if base image exists: ${{ env.BASE_IMAGE }}"
          if docker manifest inspect ${{ env.BASE_IMAGE }} > /dev/null 2>&1; then
            echo "✓ Base image found: ${{ env.BASE_IMAGE }}"
          else
            echo "::error::Base image not found: ${{ env.BASE_IMAGE }}"
            echo ""
            echo "=========================================="
            echo "ERROR: Base image does not exist in GHCR"
            echo "=========================================="
            echo ""
            echo "The production build requires a pre-built base image containing"
            echo "Seastar and build dependencies. This image must be built first."
            echo ""
            echo "To fix this, run the 'Docker Base Image' workflow manually:"
            echo ""
            echo "  1. Go to: https://github.com/${{ github.repository }}/actions/workflows/docker-base.yml"
            echo "  2. Click 'Run workflow'"
            echo "  3. Wait for it to complete (~20-30 minutes)"
            echo "  4. Re-run this workflow"
            echo ""
            echo "Or use GitHub CLI:"
            echo "  gh workflow run docker-base.yml"
            echo ""
            exit 1
          fi

      # Extract metadata for Docker tags and labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with 'latest' for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with version (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major only (v1.0.0 -> 1)
            type=semver,pattern={{major}}
            # Tag with short commit SHA for traceability
            type=sha,prefix=sha-,format=short

      # Build and push Docker image using pre-built base image
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production.fast
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit cache configuration for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Use the pre-built base image with Seastar
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            UID=10001
            GID=10001

      # Generate artifact attestation for supply chain security
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Output image details for downstream jobs
      - name: Image digest
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Base Image:** \`${{ env.BASE_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
