# Fuzz tests for Ranvier Core
#
# Runs the libFuzzer harnesses under tests/fuzz/ for a short
# post-merge regression check. Each working harness gets 60 seconds of
# fuzzer time. The corpus is cached across runs so coverage compounds —
# the second run on a branch is meaningfully better than the first.
#
# Triggers:
#   - After Docker Publish completes (post-merge to main).
#   - Manual via workflow_dispatch.
#
# This workflow does NOT run on PRs. Fuzz is too noisy and corpus-
# dependent to gate code review on; failures here flag regressions
# after merge so they can be triaged from the run page.
#
# Excluded from the main `fuzz-tests` job: stream_parser_fuzz. It links
# Seastar, whose global operator new/delete override (Hard Rule #15)
# requires a running reactor that libFuzzer's main never starts. The
# harness builds and the source is correct; running it inside the
# default ranvier-fuzz image crashes in libFuzzer's own cleanup, not in
# StreamParser. The unblock is the shared default-allocator base image
# (Dockerfile.base.default-alloc) that rebuilds Seastar with
# `-DSeastar_USE_DEFAULT_ALLOCATOR=ON`; Dockerfile.fuzz is stacked on
# top via its BASE_IMAGE build-arg. See the
# `fuzz-run-stream-parser-default-alloc` Make target and the
# `stream-parser-fuzz-default-alloc` job below. Full diagnosis lives in
# tests/fuzz/README.md "Caveats"; the unblock plan and remaining work
# live in BACKLOG §18 "Unblock Seastar-dependent fuzzing". The same
# base image also unblocks the §18 P2 ASan/UBSan sanitizer-tests
# workflow (gtest_discover_tests crash); that switch lands separately
# when the P2 ticket's "still pending" follow-up runs.
#
# Architecture note: GitHub-hosted runners are x86_64. Local fuzz runs
# (e.g. on Apple Silicon) are aarch64. Different ABIs surface different
# bugs (alignment, integer-cast behaviour); a "passes locally, fails in
# CI" finding is real signal, not a configuration issue.
name: Fuzz Tests

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/ranvier-systems/ranvier-base:latest

jobs:
  fuzz-tests:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the fuzz image from Dockerfile.fuzz (which layers clang,
      # compiler-rt, llvm, lld onto the cached base image). Reuses GHA
      # build cache so subsequent runs are layer-cache hits.
      - name: Build fuzz image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.fuzz
          load: true
          tags: ranvier-fuzz:latest
          cache-from: |
            type=gha,scope=app-amd64
            type=gha,scope=fuzz-tests
          cache-to: type=gha,mode=max,scope=fuzz-tests
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      # Restore the corpus from the most recent prior run. The primary
      # key embeds run_id so it never hits (forces a save every run);
      # restore-keys falls back to any earlier saved corpus on this OS.
      # Net effect: every run restores the latest corpus and saves an
      # updated one, so coverage accumulates across runs.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: tests/fuzz/corpus
          key: fuzz-corpus-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ runner.os }}-

      - name: Run fuzz harnesses (60s each)
        id: fuzz
        run: |
          mkdir -p fuzz-results
          docker run --rm \
            -v "$(pwd):/src" \
            -w /src \
            ranvier-fuzz:latest \
            make fuzz-ci \
            2>&1 | tee fuzz-results/fuzz-ci.log

          FUZZ_EXIT=${PIPESTATUS[0]}
          echo "fuzz_exit_code=$FUZZ_EXIT" >> $GITHUB_OUTPUT
          exit $FUZZ_EXIT

      # On crash, libFuzzer writes a `crash-<sha>` reproducer to cwd.
      # Upload both the log and any reproducers so the failure can be
      # triaged from the run page.
      - name: Upload fuzz artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crash-artifacts
          path: |
            fuzz-results/fuzz-ci.log
            crash-*
            tests/fuzz/corpus/
          retention-days: 30

      - name: Upload fuzz log on success
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fuzz-log
          path: fuzz-results/fuzz-ci.log
          retention-days: 7

  # ---------------------------------------------------------------------
  # stream_parser_fuzz, run inside a fuzz image stacked on the shared
  # Seastar default-allocator base (Dockerfile.base.default-alloc, layered
  # under Dockerfile.fuzz via its BASE_IMAGE build-arg). The same base
  # image also unblocks the §18 P2 sanitizer-tests workflow; switching
  # that workflow over lands separately when the P2 ticket's "still
  # pending" follow-up runs.
  #
  # Trigger matches the main fuzz-tests job (post-Docker-Publish
  # workflow_run + manual dispatch) as of the §18 P3 closure on
  # 2026-05-14: a 30-min local run (21.8M execs, 12K/s, 967 new corpus
  # units, no crash) promoted H10/M11/M12 to MITIGATED-BY-FUZZ in the
  # request-lifecycle audit, so the harness is now a regression gate
  # alongside radix_tree_fuzz and request_rewriter_fuzz. continue-on-error
  # dropped at the same time. The job is intentionally a separate job
  # (not workflow) from the main fuzz-tests job so the default-allocator
  # image build wiring stays co-located with the rest of the fuzz CI.
  # ---------------------------------------------------------------------
  stream-parser-fuzz-default-alloc:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Generous: the first Seastar rebuild in the default-alloc base is
    # ~30 min; on cache hits the job is bounded by FUZZ_CI_TIME (default
    # 60s) plus link time.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Driver=docker (not the default docker-container driver) so the
      # two chained buildx builds below share the runner's local docker
      # image store — the fuzz build's `FROM ranvier-base-default-alloc`
      # has to resolve against the base image we just built one step
      # earlier, and docker-container driver buildx instances can't see
      # the local daemon's images (they'd default to docker.io lookup).
      # Trade-off: the docker driver does not support `cache-to: type=gha`,
      # so the ~30-min Seastar rebuild in Dockerfile.base.default-alloc
      # is paid in full on every workflow_dispatch. Acceptable for a
      # manual, bounded job; the proper fix is to publish
      # ranvier-base-default-alloc to GHCR alongside ranvier-base so this
      # job collapses to a single-stage build (same shape as the main
      # fuzz-tests job above) — filed as a §18 P3 sub-bullet.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the shared default-allocator base on top of the cached
      # ranvier-base. ~30 min on first run; no inter-dispatch caching
      # because of the docker-driver trade-off documented above.
      - name: Build default-allocator base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base.default-alloc
          load: true
          tags: ranvier-base-default-alloc:latest
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      # Layer the fuzz toolchain (clang + compiler-rt + llvm + lld) on
      # top of the default-allocator base. Re-uses Dockerfile.fuzz
      # unchanged; the BASE_IMAGE build-arg is the only delta from the
      # main fuzz-tests job. Resolves the FROM against the local docker
      # daemon (loaded by the previous step) because of the docker
      # driver — see "Set up Docker Buildx" above.
      - name: Build fuzz image on default-allocator base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.fuzz
          load: true
          tags: ranvier-fuzz-default-alloc:latest
          build-args: |
            BASE_IMAGE=ranvier-base-default-alloc:latest

      # Restore the stream_parser corpus separately from the main
      # fuzz-tests job — the harness has its own subdirectory and we
      # don't want a regression in one to clobber the other's coverage.
      - name: Restore stream_parser corpus
        uses: actions/cache@v4
        with:
          path: tests/fuzz/corpus/stream_parser
          key: fuzz-corpus-stream-parser-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-stream-parser-${{ runner.os }}-

      # Gating as of 2026-05-14: the 30-min local pass that promoted
      # H10/M11/M12 to MITIGATED-BY-FUZZ established the baseline, so a
      # crash on the FUZZ_CI_TIME smoke run is a regression that should
      # fail the job.
      - name: Build harness and fuzz inside default-allocator fuzz image
        id: fuzz_default_alloc
        run: |
          mkdir -p fuzz-results
          docker run --rm \
            -v "$(pwd):/src" \
            -w /src \
            -e FUZZ_TIME=${FUZZ_CI_TIME:-60} \
            ranvier-fuzz-default-alloc:latest \
            make fuzz-run-stream-parser-default-alloc \
            2>&1 | tee fuzz-results/fuzz-stream-parser-default-alloc.log

          FUZZ_EXIT=${PIPESTATUS[0]}
          echo "fuzz_exit_code=$FUZZ_EXIT" >> $GITHUB_OUTPUT
          exit $FUZZ_EXIT

      - name: Upload stream_parser fuzz artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stream-parser-fuzz-default-alloc
          path: |
            fuzz-results/fuzz-stream-parser-default-alloc.log
            crash-*
            tests/fuzz/corpus/stream_parser
          retention-days: 30

      - name: Annotate stream_parser fuzz outcome
        if: always()
        run: |
          if [ "${{ steps.fuzz_default_alloc.outputs.fuzz_exit_code }}" = "0" ]; then
            echo "::notice::stream_parser_fuzz (Seastar default allocator) passed."
          else
            echo "::warning::stream_parser_fuzz (Seastar default allocator) reported a finding (exit ${{ steps.fuzz_default_alloc.outputs.fuzz_exit_code }}). See uploaded log + crash reproducers; file per BACKLOG §18."
          fi
