# Docker Compose for Multi-Node Integration Testing
# Sets up 3 Ranvier nodes and 2 mock backends for cluster testing
#
# Usage:
#   Pre-build for faster repeated runs:
#     make docker-build
#   Then run tests:
#     make test-integration

networks:
  ranvier-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # Mock backend servers (simulating vLLM endpoints)
  backend1:
    image: ranvier-mock-backend:latest
    build:
      context: ./tests/integration
      dockerfile: Dockerfile.mock-backend
    container_name: backend1
    networks:
      ranvier-test:
        ipv4_address: 172.28.1.10
    ports:
      - "21434:8000"
    environment:
      - BACKEND_ID=1

  backend2:
    image: ranvier-mock-backend:latest
    build:
      context: ./tests/integration
      dockerfile: Dockerfile.mock-backend
    container_name: backend2
    networks:
      ranvier-test:
        ipv4_address: 172.28.1.11
    ports:
      - "21435:8000"
    environment:
      - BACKEND_ID=2

  # Ranvier Node 1 (Primary for registration tests)
  ranvier1:
    image: ranvier:latest
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: ranvier1
    read_only: true
    tmpfs:
      - /tmp:size=64M    # SQLite WAL files (RANVIER_DB_PATH=/tmp/ranvier.db) + scratch
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK          # Required by Seastar for memory locking (mlock/mlockall)
    networks:
      ranvier-test:
        ipv4_address: 172.28.2.1
    ports:
      - "8081:8080"
      - "9181:9180"
    environment:
      # Cluster configuration via environment variables
      - RANVIER_CLUSTER_ENABLED=true
      - RANVIER_CLUSTER_GOSSIP_PORT=9190
      - RANVIER_CLUSTER_PEERS=172.28.2.2:9190,172.28.2.3:9190
      - RANVIER_CLUSTER_GOSSIP_INTERVAL_MS=500
      - RANVIER_CLUSTER_GOSSIP_HEARTBEAT_INTERVAL=2
      - RANVIER_CLUSTER_GOSSIP_PEER_TIMEOUT=6
      # Routing config for testing
      - RANVIER_MIN_TOKEN_LENGTH=2
      - RANVIER_DB_PATH=/tmp/ranvier.db
      - RANVIER_ENABLE_TOKEN_FORWARDING=${RANVIER_ENABLE_TOKEN_FORWARDING:-0}
      # §15 Intelligence Layer — all enabled for benchmark
      - RANVIER_COST_ESTIMATION_ENABLED=true
      - RANVIER_PRIORITY_TIER_ENABLED=true
      - RANVIER_INTENT_CLASSIFICATION_ENABLED=true
      - RANVIER_BACKPRESSURE_ENABLE_PRIORITY_QUEUE=true
      - RANVIER_AGENT_REGISTRY_ENABLED=true
      - RANVIER_AGENT_AUTO_DETECT=true
      - RANVIER_HEALTH_ENABLE_VLLM_METRICS=true
      - RANVIER_COST_ROUTING_ENABLED=true
    command: ["./ranvier_server", "--smp", "1", "--memory", "512M", "--reserve-memory", "128M"]
    depends_on:
      - backend1
      - backend2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9180/metrics"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Ranvier Node 2
  ranvier2:
    image: ranvier:latest
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: ranvier2
    read_only: true
    tmpfs:
      - /tmp:size=64M    # SQLite WAL files + scratch
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK          # Required by Seastar for memory locking (mlock/mlockall)
    networks:
      ranvier-test:
        ipv4_address: 172.28.2.2
    ports:
      - "8082:8080"
      - "9182:9180"
    environment:
      - RANVIER_CLUSTER_ENABLED=true
      - RANVIER_CLUSTER_GOSSIP_PORT=9190
      - RANVIER_CLUSTER_PEERS=172.28.2.1:9190,172.28.2.3:9190
      - RANVIER_CLUSTER_GOSSIP_INTERVAL_MS=500
      - RANVIER_CLUSTER_GOSSIP_HEARTBEAT_INTERVAL=2
      - RANVIER_CLUSTER_GOSSIP_PEER_TIMEOUT=6
      - RANVIER_MIN_TOKEN_LENGTH=2
      - RANVIER_DB_PATH=/tmp/ranvier.db
      - RANVIER_ENABLE_TOKEN_FORWARDING=${RANVIER_ENABLE_TOKEN_FORWARDING:-0}
      # §15 Intelligence Layer — all enabled for benchmark
      - RANVIER_COST_ESTIMATION_ENABLED=true
      - RANVIER_PRIORITY_TIER_ENABLED=true
      - RANVIER_INTENT_CLASSIFICATION_ENABLED=true
      - RANVIER_BACKPRESSURE_ENABLE_PRIORITY_QUEUE=true
      - RANVIER_AGENT_REGISTRY_ENABLED=true
      - RANVIER_AGENT_AUTO_DETECT=true
      - RANVIER_HEALTH_ENABLE_VLLM_METRICS=true
      - RANVIER_COST_ROUTING_ENABLED=true
    command: ["./ranvier_server", "--smp", "1", "--memory", "512M", "--reserve-memory", "128M"]
    depends_on:
      - backend1
      - backend2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9180/metrics"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Ranvier Node 3
  ranvier3:
    image: ranvier:latest
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: ranvier3
    read_only: true
    tmpfs:
      - /tmp:size=64M    # SQLite WAL files + scratch
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK          # Required by Seastar for memory locking (mlock/mlockall)
    networks:
      ranvier-test:
        ipv4_address: 172.28.2.3
    ports:
      - "8083:8080"
      - "9183:9180"
    environment:
      - RANVIER_CLUSTER_ENABLED=true
      - RANVIER_CLUSTER_GOSSIP_PORT=9190
      - RANVIER_CLUSTER_PEERS=172.28.2.1:9190,172.28.2.2:9190
      - RANVIER_CLUSTER_GOSSIP_INTERVAL_MS=500
      - RANVIER_CLUSTER_GOSSIP_HEARTBEAT_INTERVAL=2
      - RANVIER_CLUSTER_GOSSIP_PEER_TIMEOUT=6
      - RANVIER_MIN_TOKEN_LENGTH=2
      - RANVIER_DB_PATH=/tmp/ranvier.db
      - RANVIER_ENABLE_TOKEN_FORWARDING=${RANVIER_ENABLE_TOKEN_FORWARDING:-0}
      # §15 Intelligence Layer — all enabled for benchmark
      - RANVIER_COST_ESTIMATION_ENABLED=true
      - RANVIER_PRIORITY_TIER_ENABLED=true
      - RANVIER_INTENT_CLASSIFICATION_ENABLED=true
      - RANVIER_BACKPRESSURE_ENABLE_PRIORITY_QUEUE=true
      - RANVIER_AGENT_REGISTRY_ENABLED=true
      - RANVIER_AGENT_AUTO_DETECT=true
      - RANVIER_HEALTH_ENABLE_VLLM_METRICS=true
      - RANVIER_COST_ROUTING_ENABLED=true
    command: ["./ranvier_server", "--smp", "1", "--memory", "512M", "--reserve-memory", "128M"]
    depends_on:
      - backend1
      - backend2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9180/metrics"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Locust load testing service
  locust:
    image: ranvier-locust:latest
    build:
      context: ./tests/integration
      dockerfile: Dockerfile.locust
    container_name: locust
    networks:
      - ranvier-test
    ports:
      - "8089:8089"   # Web UI
      - "8090:8090"   # Secondary port for metrics export
    environment:
      - LOCUST_HOST=http://172.28.2.1:8080
      - LOCUST_LOCUSTFILE=/mnt/locust/locustfile.py
      - RANVIER_NODE1=http://172.28.2.1:8080
      - RANVIER_NODE2=http://172.28.2.2:8080
      - RANVIER_NODE3=http://172.28.2.3:8080
      - RANVIER_METRICS1=http://172.28.2.1:9180
      - RANVIER_METRICS2=http://172.28.2.2:9180
      - RANVIER_METRICS3=http://172.28.2.3:9180
      - BACKEND1_IP=172.28.1.10
      - BACKEND1_PORT=8000
      - BACKEND2_IP=172.28.1.11
      - BACKEND2_PORT=8000
      - P99_LATENCY_THRESHOLD_MS=${P99_LATENCY_THRESHOLD_MS:-100}
    depends_on:
      ranvier1:
        condition: service_healthy
      ranvier2:
        condition: service_healthy
      ranvier3:
        condition: service_healthy
    profiles:
      - benchmark
